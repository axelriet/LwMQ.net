version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    nodejs: "20"
  jobs:
    post_install:
      - python -m pip install sphinxcontrib-mermaid
      - npm install -g @mermaid-js/mermaid-cli

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py
